services:
  db:
    image: postgres
    restart: unless-stopped
    volumes: 
      - /var/lib/postgresql
    environment: 
    - POSTGRES_PASSWORD=Root_2026_Secure!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy

  front: 
    build: ./client
    restart: unless-stopped
    ports: 
      - 80:80
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    
volumes:
  pgdata:
